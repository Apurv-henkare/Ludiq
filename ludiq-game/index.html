<!doctype html>
<html lang="en-us">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="format-detection" content="telephone=no">
<meta name="theme-color" content="#000000">
<meta name="screen-orientation" content="landscape">

<title>LUDIQ - Money Spender Game</title>

<!-- PRELOAD: hint browser to start downloading heavy files early -->
<link rel="preload" href="love.wasm" as="fetch" crossorigin>
<link rel="preload" href="game.data" as="fetch" crossorigin>
<link rel="preload" href="love.js" as="script">
<link rel="preload" href="game.js" as="script">

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box!important;margin:0!important;padding:0!important;-webkit-tap-highlight-color:transparent!important;-webkit-touch-callout:none!important;-webkit-user-select:none!important;user-select:none!important}
html,body{width:100%!important;height:100%!important;height:100dvh!important;background:#000!important;overflow:hidden!important;touch-action:none!important;font-family:Arial,sans-serif!important;position:fixed!important;inset:0!important}
#canvas{position:fixed!important;top:0!important;left:0!important;width:100vw!important;height:100vh!important;height:100dvh!important;display:block!important;border:0!important;padding:0!important;background:#000!important;-webkit-transform:translateZ(0)!important;transform:translateZ(0)!important;z-index:1}
#iosBackBtn{display:none;position:fixed;top:10px;left:10px;z-index:99999;background:rgba(0,0,0,0.6);border:2px solid rgba(0,255,231,0.5);border-radius:50%;width:44px;height:44px;cursor:pointer;align-items:center;justify-content:center;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);transition:opacity 0.3s}
#iosBackBtn::after{content:'✕';color:#00ffe7;font-size:20px;font-weight:bold}
#iosBackBtn:active{background:rgba(0,255,231,0.3);transform:scale(0.9)}
#iosBackBtn.faded{opacity:0.3}
#splash{position:fixed;inset:0;background:radial-gradient(ellipse at center,#0d1525 0%,#050810 100%);display:flex;justify-content:center;align-items:center;z-index:100;overflow:hidden}
.sp-box{display:flex;flex-direction:column;align-items:center;width:88%;max-width:420px}
.sp-title{font-family:'Press Start 2P',monospace;font-size:clamp(0.7rem,3vw,1.1rem);color:#FFB800;text-shadow:0 0 10px #FFB80088;margin-bottom:4px;letter-spacing:1px}
.sp-sub{font-family:'Press Start 2P',monospace;font-size:clamp(0.3rem,1.3vw,0.45rem);color:#ff9900;margin-top:4px}
#runBtn{font-family:'Press Start 2P',monospace;font-size:clamp(0.55rem,2.2vw,0.85rem);color:#000;background:#FFB800;border:none;border-radius:50px;padding:clamp(12px,2.5vh,18px) clamp(28px,7vw,55px);cursor:pointer;margin-top:clamp(18px,4vh,35px);transition:transform 0.15s;box-shadow:0 0 25px #FFB80055;animation:btnGlow 2.5s ease-in-out infinite;-webkit-appearance:none}
#runBtn:active{transform:scale(0.92)}
@keyframes btnGlow{0%,100%{box-shadow:0 0 20px #FFB80044}50%{box-shadow:0 0 35px #FFB80088,0 0 70px #FFB80033}}
.sp-hint{font-family:'Press Start 2P',monospace;font-size:clamp(0.25rem,1vw,0.35rem);color:#333;margin-top:clamp(10px,2vh,18px)}
.sp-size{font-family:'Press Start 2P',monospace;font-size:clamp(0.22rem,0.9vw,0.3rem);color:#282828;margin-top:6px}
#loader{position:fixed;inset:0;display:none;flex-direction:column;justify-content:center;align-items:center;background:#050810!important;color:white;z-index:90}
.ld-title{font-family:'Press Start 2P',monospace;font-size:clamp(0.55rem,2.5vw,0.9rem);color:#FFB800;text-shadow:0 0 8px #FFB800}
.ld-sub{font-family:'Press Start 2P',monospace;font-size:clamp(0.3rem,1.2vw,0.42rem);color:#ff9900;margin-top:4px;margin-bottom:clamp(16px,3vh,28px)}
.ld-bar-wrap{width:78%;max-width:320px;height:12px;border-radius:20px;background:#151525;overflow:hidden;border:1px solid #252540}
#bar{width:0%;height:100%;background:linear-gradient(90deg,#FFB800,#FF6B2C);border-radius:20px;transition:width 0.15s linear}
#pct{font-family:'Press Start 2P',monospace;font-size:clamp(0.45rem,2vw,0.7rem);color:#FFB800;margin-top:clamp(8px,1.5vh,14px)}
#dlInfo{font-family:'Press Start 2P',monospace;font-size:clamp(0.22rem,0.9vw,0.32rem);color:#444;margin-top:5px;min-height:1.2em}
.fadeOut{animation:fadeAway 0.5s forwards;pointer-events:none}
@keyframes fadeAway{to{opacity:0;visibility:hidden}}
#rotatePrompt{display:none;position:fixed;inset:0;background:#000000f5!important;color:white;font-family:'Press Start 2P',monospace;flex-direction:column;justify-content:center;align-items:center;z-index:9999;text-align:center}
.rt-icon{font-size:clamp(2rem,8vh,3rem);margin-bottom:14px}
.rt-text{font-size:clamp(0.4rem,1.8vw,0.6rem);line-height:2}
@media(orientation:portrait){#rotatePrompt.active{display:flex!important}}
footer{display:none!important}
</style>
</head>

<body>

<div id="iosBackBtn" onclick="goToHub()"></div>

<div id="rotatePrompt">
  <div class="rt-icon">📱↻</div>
  <div class="rt-text">Please rotate your device<br>to landscape mode</div>
</div>

<div id="splash">
  <div class="sp-box">
    <div class="sp-title">LUDIQ</div>
    <div class="sp-sub">Money Spender Game</div>
    <button id="runBtn" onclick="runGame()">▶ PLAY</button>
    <div class="sp-hint">Tap to play fullscreen</div>
    <div class="sp-size">~5 MB download</div>
  </div>
</div>

<div id="loader">
  <div class="ld-title">💰 LUDIQ</div>
  <div class="ld-sub">Make Every Rupee Count!</div>
  <div class="ld-bar-wrap"><div id="bar"></div></div>
  <div id="pct">0%</div>
  <div id="dlInfo"></div>
</div>

<canvas id="canvas" style="visibility:hidden;"></canvas>

<script>
var isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)||(navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1);
var isAndroid=/Android/i.test(navigator.userAgent);
var isStandalone=window.navigator.standalone===true||window.matchMedia('(display-mode: standalone)').matches||window.matchMedia('(display-mode: fullscreen)').matches;
var isTouchDevice=(navigator.maxTouchPoints||0)>0||'ontouchstart'in window||/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)||(navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1);
var orientationLocked=false;

// WebGL1 ONLY (WebGL2 is slow on iOS Safari)
var _preGLContext=null;
(function(){
  var c=document.getElementById('canvas');
  if(!c)return;
  _preGLContext=c.getContext('webgl',{
    alpha:false,depth:true,stencil:false,antialias:false,
    premultipliedAlpha:false,preserveDrawingBuffer:false,
    powerPreference:'high-performance',failIfMajorPerformanceCaveat:false
  });
})();

function setCanvasSize(){
  var c=document.getElementById('canvas');
  if(!c)return;
  var w=window.innerWidth,h=window.innerHeight;
  if(window.visualViewport){w=Math.round(window.visualViewport.width);h=Math.round(window.visualViewport.height)}
  c.width=w;c.height=h;
}

function lockLandscape(){
  if(screen.orientation&&screen.orientation.lock){
    screen.orientation.lock('landscape').then(function(){
      orientationLocked=true;
      var rp=document.getElementById('rotatePrompt');
      if(rp)rp.classList.remove('active');
    }).catch(function(){
      if(isIOS&&isTouchDevice){var rp=document.getElementById('rotatePrompt');if(rp)rp.classList.add('active')}
    });
  }else if(isTouchDevice){
    var rp=document.getElementById('rotatePrompt');
    if(rp)rp.classList.add('active');
  }
}

function unlockOrientation(){
  if(screen.orientation&&screen.orientation.unlock){try{screen.orientation.unlock()}catch(e){}}
}

var isNavigating=false;
var weExitedFullscreen=false;

function goToHub(){
  if(isNavigating)return;
  isNavigating=true;
  unlockOrientation();
  window.location.replace('../index.html');
}

function onFullscreenExit(){
  if(isStandalone)return;
  var isFs=document.fullscreenElement||document.webkitFullscreenElement;
  if(!isFs&&gameStarted&&!weExitedFullscreen&&!isNavigating)goToHub();
  weExitedFullscreen=false;
}
document.addEventListener('fullscreenchange',onFullscreenExit);
document.addEventListener('webkitfullscreenchange',onFullscreenExit);

if(isStandalone){
  history.pushState({game:true},'');
  window.addEventListener('popstate',function(){goToHub()});
}

function showIOSBackBtn(){
  var btn=document.getElementById('iosBackBtn');
  if(!btn)return;
  if(isIOS||isStandalone){
    btn.style.display='flex';
    setTimeout(function(){btn.classList.add('faded')},4000);
    document.addEventListener('touchstart',function(){
      btn.classList.remove('faded');
      clearTimeout(btn._fadeTimer);
      btn._fadeTimer=setTimeout(function(){btn.classList.add('faded')},4000);
    });
  }
}

function enterFullscreen(){
  if(isNavigating)return;
  var el=document.documentElement;
  if(document.fullscreenElement||document.webkitFullscreenElement)return;
  var rfs=el.requestFullscreen||el.webkitRequestFullscreen||el.mozRequestFullScreen||el.msRequestFullscreen;
  if(rfs){
    rfs.call(el).then(function(){
      if(!isNavigating){setTimeout(lockLandscape,100);setTimeout(resizeCanvas,100);setTimeout(resizeCanvas,400)}
    }).catch(function(){lockLandscape()});
  }else{lockLandscape()}
}

function iosHideBar(){
  document.body.style.height=(window.innerHeight+50)+'px';
  document.body.style.overflow='auto';
  document.body.style.position='relative';
  setTimeout(function(){
    window.scrollTo(0,1);
    setTimeout(function(){
      document.body.style.height='100%';
      document.body.style.overflow='hidden';
      document.body.style.position='fixed';
      resizeCanvas();
    },300);
  },100);
}

function resizeCanvas(){
  if(isNavigating)return;
  var c=document.getElementById("canvas");
  if(!c)return;
  var w=window.innerWidth,h=window.innerHeight;
  if(window.visualViewport){w=Math.round(window.visualViewport.width);h=Math.round(window.visualViewport.height)}
  c.style.setProperty('width',w+'px','important');
  c.style.setProperty('height',h+'px','important');
  c.style.setProperty('top','0px','important');
  c.style.setProperty('left','0px','important');
  if(gameStarted){c.width=w;c.height=h}
}

window.addEventListener("resize",function(){if(!isNavigating)resizeCanvas()});
if(window.visualViewport){window.visualViewport.addEventListener('resize',function(){if(!isNavigating)resizeCanvas()})}
window.addEventListener("orientationchange",function(){
  if(isNavigating)return;
  setTimeout(resizeCanvas,100);setTimeout(resizeCanvas,300);setTimeout(resizeCanvas,600);
  if(gameStarted&&!orientationLocked)setTimeout(lockLandscape,200);
});

function pv(e){if(e.target&&e.target.id==='iosBackBtn')return;if(gameStarted)e.preventDefault()}
document.addEventListener('touchstart',pv,{passive:false});
document.addEventListener('touchmove',pv,{passive:false});
document.addEventListener('touchend',pv,{passive:false});
document.addEventListener('gesturestart',function(e){e.preventDefault()});
document.addEventListener('gesturechange',function(e){e.preventDefault()});
document.addEventListener('gestureend',function(e){e.preventDefault()});
document.addEventListener('contextmenu',function(e){if(gameStarted)e.preventDefault()});
var lte=0;
document.addEventListener('touchend',function(e){var n=Date.now();if(n-lte<=300)e.preventDefault();lte=n},{passive:false});
window.addEventListener("keydown",function(e){if([32,37,38,39,40].includes(e.keyCode))e.preventDefault()});

var au=false;
var _globalAudioCtx=null;

function unlockAudio(){
  if(au)return;
  try{
    _globalAudioCtx=new(window.AudioContext||window.webkitAudioContext)();
    var b=_globalAudioCtx.createBuffer(1,1,22050);
    var s=_globalAudioCtx.createBufferSource();
    s.buffer=b;s.connect(_globalAudioCtx.destination);s.start(0);
    if(_globalAudioCtx.state==='suspended')_globalAudioCtx.resume();
  }catch(e){}
  au=true;
}

function resumeAllAudio(){
  try{
    if(_globalAudioCtx&&_globalAudioCtx.state==='suspended')_globalAudioCtx.resume();
    if(typeof Module!=='undefined'&&Module.SDL2&&Module.SDL2.audioContext){
      if(Module.SDL2.audioContext.state==='suspended')Module.SDL2.audioContext.resume();
    }
  }catch(e){}
}
['touchstart','click'].forEach(function(evt){document.addEventListener(evt,resumeAllAudio,{once:false,passive:true})});

document.addEventListener('visibilitychange',function(){
  if(typeof Module==='undefined')return;
  try{
    var sdlCtx=Module.SDL2&&Module.SDL2.audioContext;
    if(document.hidden){
      if(sdlCtx&&sdlCtx.state==='running')sdlCtx.suspend();
      if(_globalAudioCtx&&_globalAudioCtx.state==='running')_globalAudioCtx.suspend();
    }else{
      if(sdlCtx&&sdlCtx.state==='suspended')sdlCtx.resume();
      if(_globalAudioCtx&&_globalAudioCtx.state==='suspended')_globalAudioCtx.resume();
      if(gameStarted){setTimeout(resizeCanvas,50);setTimeout(resizeCanvas,300)}
    }
  }catch(e){}
});

/* ============================================================
   PROGRESS TRACKING SYSTEM
   Downloads love.wasm + game.data with real byte-level progress
   BEFORE loading Emscripten scripts, so the bar actually moves.
   ============================================================ */

var barEl, pctEl, dlInfoEl;
var gameStarted = false;

// Phases and their weight in the progress bar (total = 100%)
// Phase 1: Download assets      (0% - 70%)   — real byte progress
// Phase 2: Load scripts         (70% - 80%)  — fast, small JS files
// Phase 3: WASM compile + init  (80% - 100%) — animated, no real events

var currentProgress = 0;

function setProgress(pct, info) {
  pct = Math.min(100, Math.max(0, Math.round(pct)));
  // Never go backwards
  if (pct < currentProgress) pct = currentProgress;
  currentProgress = pct;
  if (barEl) barEl.style.width = pct + '%';
  if (pctEl) pctEl.textContent = pct + '%';
  if (dlInfoEl && info !== undefined) dlInfoEl.textContent = info;
}

// Fetch a file with real download progress via ReadableStream
function fetchWithProgress(url) {
  return new Promise(function(resolve, reject) {
    // Try ReadableStream progress (modern browsers)
    fetch(url).then(function(response) {
      if (!response.ok) { reject(new Error('HTTP ' + response.status)); return; }
      var contentLength = response.headers.get('content-length');
      var total = contentLength ? parseInt(contentLength, 10) : 0;

      // If no content-length or no ReadableStream, fall back
      if (!total || !response.body || !response.body.getReader) {
        response.arrayBuffer().then(function(buf) {
          resolve({ url: url, size: buf.byteLength });
        });
        return;
      }

      var reader = response.body.getReader();
      var received = 0;
      var chunks = [];

      function pump() {
        reader.read().then(function(result) {
          if (result.done) {
            resolve({ url: url, size: received });
            return;
          }
          chunks.push(result.value);
          received += result.value.length;
          // Report per-file progress to the combined tracker
          onFileProgress(url, received, total);
          pump();
        }).catch(reject);
      }
      pump();
    }).catch(reject);
  });
}

// Track combined download progress across multiple files
var fileSizes = {};      // url -> expected total bytes
var fileLoaded = {};     // url -> bytes received so far
var totalExpectedBytes = 0;
var filesToDownload = ['love.wasm', 'game.data'];

function onFileProgress(url, loaded, total) {
  fileLoaded[url] = loaded;
  if (total && !fileSizes[url]) {
    fileSizes[url] = total;
    totalExpectedBytes = 0;
    for (var k in fileSizes) totalExpectedBytes += fileSizes[k];
  }

  // Calculate combined progress
  var totalLoaded = 0;
  for (var k in fileLoaded) totalLoaded += fileLoaded[k];

  if (totalExpectedBytes > 0) {
    var dlPct = (totalLoaded / totalExpectedBytes);
    // Downloads are 0-70% of total progress
    var overallPct = Math.round(dlPct * 70);
    var mbLoaded = (totalLoaded / 1048576).toFixed(1);
    var mbTotal = (totalExpectedBytes / 1048576).toFixed(1);
    setProgress(overallPct, mbLoaded + ' / ' + mbTotal + ' MB');
  }
}

// Animated progress for phases without real progress events
var animInterval = null;
function animateProgress(from, to, duration, info, callback) {
  var start = Date.now();
  if (animInterval) clearInterval(animInterval);
  animInterval = setInterval(function() {
    var elapsed = Date.now() - start;
    var t = Math.min(1, elapsed / duration);
    // Ease out curve — fast start, slow end (feels responsive)
    var eased = 1 - Math.pow(1 - t, 3);
    var pct = Math.round(from + (to - from) * eased);
    setProgress(pct, info);
    if (t >= 1) {
      clearInterval(animInterval);
      animInterval = null;
      if (callback) callback();
    }
  }, 50);
}

function loadScript(src) {
  return new Promise(function(resolve, reject) {
    var s = document.createElement('script');
    s.src = src;
    s.onload = resolve;
    s.onerror = reject;
    document.body.appendChild(s);
  });
}

function runGame() {
  if (gameStarted) return;
  gameStarted = true;
  if (!isStandalone) { enterFullscreen(); if (isIOS) iosHideBar(); }
  unlockAudio();
  showIOSBackBtn();
  document.getElementById('splash').style.display = 'none';
  document.getElementById('loader').style.display = 'flex';
  setCanvasSize();

  barEl = document.getElementById('bar');
  pctEl = document.getElementById('pct');
  dlInfoEl = document.getElementById('dlInfo');

  setProgress(1, 'Connecting...');

  // PHASE 1: Download heavy files with real progress (0% - 70%)
  Promise.all([
    fetchWithProgress('love.wasm'),
    fetchWithProgress('game.data')
  ]).then(function(results) {
    setProgress(70, 'Downloads complete');

    // PHASE 2: Load JS scripts (70% - 80%)
    setProgress(72, 'Loading scripts...');
    return Promise.all([
      loadScript('game.js'),
      loadScript('love.js')
    ]);
  }).then(function() {
    // PHASE 3: WASM compilation + init (80% - 99%)
    // Emscripten compiles WASM here — no progress events available
    // Animate smoothly so user sees movement
    setProgress(80, 'Compiling engine...');
    animateProgress(80, 95, 4000, 'Starting engine...');

    // Hand off to Emscripten
    applicationLoad();
  }).catch(function(err) {
    setProgress(0, 'Load error — tap to retry');
    console.error('Load failed:', err);
    gameStarted = false;
    // Allow retry
    document.getElementById('loader').addEventListener('click', function() {
      document.getElementById('loader').style.display = 'none';
      document.getElementById('splash').style.display = 'flex';
    }, { once: true });
  });
}

/* ============================================================
   EMSCRIPTEN MODULE CONFIG
   ============================================================ */

var Module = {
  arguments: ["./game.love"],
  INITIAL_MEMORY: 33554432,
  canvas: (function(){ return document.getElementById("canvas") })(),
  preinitializedWebGLContext: _preGLContext,
  print: function(){},
  printErr: function(){},

  setStatus: function(text) {
    if (isNavigating) return;
    if (!text) {
      // Emscripten is done — game is ready
      if (animInterval) { clearInterval(animInterval); animInterval = null; }
      setProgress(100, 'Launching!');

      var loader = document.getElementById("loader");
      var canvas = document.getElementById("canvas");
      if (loader) loader.classList.add("fadeOut");
      if (canvas) {
        canvas.style.visibility = "visible";
        setCanvasSize();
        resizeCanvas();
        if (!isStandalone) enterFullscreen();
      }
      setTimeout(function() {
        var s = document.getElementById('splash');
        var l = document.getElementById('loader');
        if (s && s.parentNode) s.parentNode.removeChild(s);
        if (l && l.parentNode) l.parentNode.removeChild(l);
      }, 800);
      return;
    }

    // Emscripten progress events (extracting game data, etc.)
    var m = text.match(/\((\d+)\/(\d+)\)/);
    if (m) {
      var loaded = parseInt(m[1]), total = parseInt(m[2]);
      // Map Emscripten's internal progress to 85-99% range
      var emPct = Math.round(85 + (loaded / total) * 14);
      setProgress(emPct, 'Unpacking game...');
    }
  },

  monitorRunDependencies: function(left) {
    var t = this.totalDependencies || 0;
    this.totalDependencies = Math.max(t, left);
    if (t > 0 && left === 0) {
      // All dependencies resolved
      setProgress(99, 'Almost ready...');
    }
  }
};

function applicationLoad() { Love(Module); }
resizeCanvas();
</script>

</body>
</html>
